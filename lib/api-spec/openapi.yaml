openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Electronics Store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: categories
    description: Category operations
  - name: brands
    description: Brand operations
  - name: banners
    description: Banner operations
  - name: faqs
    description: FAQ operations
  - name: testimonials
    description: Testimonial operations
  - name: settings
    description: Store settings operations
  - name: admin
    description: Admin authentication operations
  - name: dashboard
    description: Dashboard summary operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: brandId
          in: query
          schema:
            type: integer
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: featured
          in: query
          schema:
            type: boolean
        - name: bestSeller
          in: query
          schema:
            type: boolean
        - name: newArrival
          in: query
          schema:
            type: boolean
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [newest, price_asc, price_desc, popularity]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product (admin)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update product (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}/related:
    get:
      operationId: getRelatedProducts
      tags: [products]
      summary: Get related products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Related products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/slug/{slug}:
    get:
      operationId: getProductBySlug
      tags: [products]
      summary: Get product by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create category (admin)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update category (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /brands:
    get:
      operationId: listBrands
      tags: [brands]
      summary: List brands
      responses:
        "200":
          description: Brands list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
    post:
      operationId: createBrand
      tags: [brands]
      summary: Create brand (admin)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandBody"
      responses:
        "201":
          description: Brand created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"

  /brands/{id}:
    put:
      operationId: updateBrand
      tags: [brands]
      summary: Update brand (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandBody"
      responses:
        "200":
          description: Updated brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
    delete:
      operationId: deleteBrand
      tags: [brands]
      summary: Delete brand (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /banners:
    get:
      operationId: listBanners
      tags: [banners]
      summary: List banners
      responses:
        "200":
          description: Banners list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Banner"
    post:
      operationId: createBanner
      tags: [banners]
      summary: Create banner (admin)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBannerBody"
      responses:
        "201":
          description: Banner created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"

  /banners/{id}:
    put:
      operationId: updateBanner
      tags: [banners]
      summary: Update banner (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBannerBody"
      responses:
        "200":
          description: Updated banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"
    delete:
      operationId: deleteBanner
      tags: [banners]
      summary: Delete banner (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /faqs:
    get:
      operationId: listFaqs
      tags: [faqs]
      summary: List FAQs
      responses:
        "200":
          description: FAQs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Faq"
    post:
      operationId: createFaq
      tags: [faqs]
      summary: Create FAQ (admin)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFaqBody"
      responses:
        "201":
          description: FAQ created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faq"

  /faqs/{id}:
    put:
      operationId: updateFaq
      tags: [faqs]
      summary: Update FAQ (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFaqBody"
      responses:
        "200":
          description: Updated FAQ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Faq"
    delete:
      operationId: deleteFaq
      tags: [faqs]
      summary: Delete FAQ (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /testimonials:
    get:
      operationId: listTestimonials
      tags: [testimonials]
      summary: List testimonials
      responses:
        "200":
          description: Testimonials list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"
    post:
      operationId: createTestimonial
      tags: [testimonials]
      summary: Create testimonial (admin)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestimonialBody"
      responses:
        "201":
          description: Testimonial created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"

  /testimonials/{id}:
    put:
      operationId: updateTestimonial
      tags: [testimonials]
      summary: Update testimonial (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestimonialBody"
      responses:
        "200":
          description: Updated testimonial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"
    delete:
      operationId: deleteTestimonial
      tags: [testimonials]
      summary: Delete testimonial (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get store settings
      responses:
        "200":
          description: Store settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update store settings (admin)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSettings"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Admin user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: admin_session

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    ProductImage:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        imageUrl:
          type: string
        isMain:
          type: boolean
      required:
        - id
        - productId
        - imageUrl
        - isMain

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        shortDescription:
          type: string
          nullable: true
        fullDescription:
          type: string
          nullable: true
        price:
          type: string
        oldPrice:
          type: string
          nullable: true
        sku:
          type: string
          nullable: true
        stockQuantity:
          type: integer
        stockStatus:
          type: string
          enum: [in_stock, low_stock, out_of_stock]
        featured:
          type: boolean
        bestSeller:
          type: boolean
        newArrival:
          type: boolean
        isPublished:
          type: boolean
        seoTitle:
          type: string
          nullable: true
        seoDescription:
          type: string
          nullable: true
        specifications:
          type: string
          nullable: true
        brandId:
          type: integer
          nullable: true
        categoryId:
          type: integer
          nullable: true
        brand:
          $ref: "#/components/schemas/Brand"
          nullable: true
        category:
          $ref: "#/components/schemas/Category"
          nullable: true
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProductImage"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - slug
        - price
        - stockQuantity
        - stockStatus
        - featured
        - bestSeller
        - newArrival
        - isPublished
        - images
        - createdAt
        - updatedAt

    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - products
        - total
        - page
        - limit
        - totalPages

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        shortDescription:
          type: string
          nullable: true
        fullDescription:
          type: string
          nullable: true
        price:
          type: string
        oldPrice:
          type: string
          nullable: true
        sku:
          type: string
          nullable: true
        stockQuantity:
          type: integer
        stockStatus:
          type: string
          enum: [in_stock, low_stock, out_of_stock]
        featured:
          type: boolean
        bestSeller:
          type: boolean
        newArrival:
          type: boolean
        isPublished:
          type: boolean
        seoTitle:
          type: string
          nullable: true
        seoDescription:
          type: string
          nullable: true
        specifications:
          type: string
          nullable: true
        brandId:
          type: integer
          nullable: true
        categoryId:
          type: integer
          nullable: true
        images:
          type: array
          items:
            type: object
            properties:
              imageUrl:
                type: string
              isMain:
                type: boolean
            required:
              - imageUrl
              - isMain
      required:
        - name
        - price
        - stockQuantity
        - stockStatus

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        shortDescription:
          type: string
          nullable: true
        fullDescription:
          type: string
          nullable: true
        price:
          type: string
        oldPrice:
          type: string
          nullable: true
        sku:
          type: string
          nullable: true
        stockQuantity:
          type: integer
        stockStatus:
          type: string
          enum: [in_stock, low_stock, out_of_stock]
        featured:
          type: boolean
        bestSeller:
          type: boolean
        newArrival:
          type: boolean
        isPublished:
          type: boolean
        seoTitle:
          type: string
          nullable: true
        seoDescription:
          type: string
          nullable: true
        specifications:
          type: string
          nullable: true
        brandId:
          type: integer
          nullable: true
        categoryId:
          type: integer
          nullable: true
        images:
          type: array
          items:
            type: object
            properties:
              imageUrl:
                type: string
              isMain:
                type: boolean
            required:
              - imageUrl
              - isMain

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        productCount:
          type: integer
      required:
        - id
        - name
        - slug
        - productCount

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
      required:
        - name
        - slug

    Brand:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        logo:
          type: string
          nullable: true
        productCount:
          type: integer
      required:
        - id
        - name
        - slug
        - productCount

    CreateBrandBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        logo:
          type: string
          nullable: true
      required:
        - name
        - slug

    Banner:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        imageUrl:
          type: string
        linkUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
        sortOrder:
          type: integer
      required:
        - id
        - title
        - imageUrl
        - isActive
        - sortOrder

    CreateBannerBody:
      type: object
      properties:
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        imageUrl:
          type: string
        linkUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
        sortOrder:
          type: integer
      required:
        - title
        - imageUrl

    Faq:
      type: object
      properties:
        id:
          type: integer
        question:
          type: string
        answer:
          type: string
        sortOrder:
          type: integer
        isActive:
          type: boolean
      required:
        - id
        - question
        - answer
        - sortOrder
        - isActive

    CreateFaqBody:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
        sortOrder:
          type: integer
        isActive:
          type: boolean
      required:
        - question
        - answer

    Testimonial:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        rating:
          type: integer
        comment:
          type: string
        isActive:
          type: boolean
      required:
        - id
        - name
        - rating
        - comment
        - isActive

    CreateTestimonialBody:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        rating:
          type: integer
        comment:
          type: string
        isActive:
          type: boolean
      required:
        - name
        - rating
        - comment

    StoreSettings:
      type: object
      properties:
        id:
          type: integer
        storeName:
          type: string
        storeTagline:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        whatsappNumber:
          type: string
        contactPhone:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        facebookUrl:
          type: string
          nullable: true
        instagramUrl:
          type: string
          nullable: true
        twitterUrl:
          type: string
          nullable: true
        footerText:
          type: string
          nullable: true
        announcementText:
          type: string
          nullable: true
        heroTitle:
          type: string
          nullable: true
        heroSubtitle:
          type: string
          nullable: true
      required:
        - id
        - storeName
        - whatsappNumber

    UpdateSettingsBody:
      type: object
      properties:
        storeName:
          type: string
        storeTagline:
          type: string
          nullable: true
        logoUrl:
          type: string
