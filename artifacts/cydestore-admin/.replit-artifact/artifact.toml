kind = "web"
previewPath = "/admin/"
title = "Cydestore Admin"
version = "1.0.0"
id = "artifacts/cydestore-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 23160

[services.development]
run = "pnpm --filter @workspace/cydestore-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cydestore-admin", "run", "build" ]
publicDir = "artifacts/cydestore-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23160"
BASE_PATH = "/admin/"
